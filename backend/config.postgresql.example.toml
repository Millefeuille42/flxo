# flxo PostgreSQL Configuration Example
# Copy this file to config.toml and adjust values as needed

[app]
secret_key = "change-this-to-a-secure-random-key"
bind = "0.0.0.0"
port = 8080
access_url = "http://localhost:8080"
allowed_origins = "http://localhost:5173"
algorithm = "HS256"
access_token_expire_minutes = 30

[db]
# PostgreSQL Configuration
driver = "postgresql"
host = "localhost"  # Use "db" when using docker-compose with --profile postgres
database = "flxo"
user = "flxo"
password = "flxo"
port = 5432

[oauth]
# OAuth2 Configuration (optional)
client_id = ""
client_secret = ""
scope = "openid email profile"
# Example values (replace with your OAuth provider):
# authorize_url = "https://auth.example.com/application/o/authorize/"
# access_token_url = "https://auth.example.com/application/o/token/"
# metadata_url = "https://auth.example.com/application/o/.well-known/openid-configuration"
# username_field = "preferred_username"
# redirect_url = "http://localhost:5173"

